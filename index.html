// 계층별 6색 팔레트 — 색상환을 고르게 분할하여 상·하위 조직이 한눈에 구별되도록 설계
const LV = {
  5: { accent:"#1D4ED8", light:"#EFF6FF", bd:"#BFDBFE", name:"법인" },      // 파란색
  4: { accent:"#7C3AED", light:"#F5F3FF", bd:"#DDD6FE", name:"본부" },      // 보라색
  3: { accent:"#047857", light:"#ECFDF5", bd:"#6EE7B7", name:"그룹/센터" }, // 초록색
  2: { accent:"#B45309", light:"#FFFBEB", bd:"#FCD34D", name:"실/랩" },     // 황색
  1: { accent:"#BE185D", light:"#FFF1F2", bd:"#FECDD3", name:"팀" },        // 분홍색
  0: { accent:"#475569", light:"#F8FAFC", bd:"#E2E8F0", name:"파트/TF" },   // 회색
};

function flat(n, l=[]) { l.push(n); if (n.ch) n.ch.forEach(c => flat(c, l)); return l; }

function Node({ node, depth, exp, toggle, matches }) {
  const has = node.ch && node.ch.length > 0;
  const open = exp.has(node.id);
  const lv = Math.min(Math.max(node.lv || 0, 0), 5);
  const col = LV[lv] || LV[0];
  const hit = matches.has(node.id);

  // 계층이 높을수록 더 크고 굵게
  const fontSize    = [12, 13, 13, 14, 15, 16][lv];
  const fontWeight  = lv >= 3 ? 700 : 600;
  const rowPadding  = ["6px 10px","7px 12px","8px 12px","9px 14px","10px 14px","11px 14px"][lv];
  const iconSize    = lv >= 4 ? 26 : lv >= 2 ? 24 : 20;

  return (
    <div style={{ marginLeft: depth > 0 ? 14 : 0 }}>
      <div
        onClick={() => has && toggle(node.id)}
        style={{
          display: "flex", alignItems: "center", gap: 10,
          padding: rowPadding,
          margin: "2px 0",
          borderRadius: 10,
          cursor: has ? "pointer" : "default",
          transition: "background 0.12s, box-shadow 0.12s",
          background: hit ? col.accent + "22" : col.light,
          border: `1px solid ${hit ? col.accent + "80" : col.bd}`,
          boxShadow: `inset 3px 0 0 0 ${col.accent}`,
          opacity: node.v ? 0.5 : 1,
        }}
      >
        {/* 토글 아이콘 */}
        <div style={{
          width: iconSize, height: iconSize,
          borderRadius: lv >= 3 ? 8 : 6,
          background: col.accent,
          color: "#fff",
          display: "flex", alignItems: "center", justifyContent: "center",
          fontSize: lv >= 4 ? 15 : 13, fontWeight: 700, flexShrink: 0,
          transition: "transform 0.2s",
          transform: has && open ? "rotate(90deg)" : "none",
        }}>
          {has ? "›" : "·"}
        </div>

        {/* 조직명 + 정보 */}
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
            <span style={{
              fontSize, fontWeight, color: "#0F172A",
              whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis",
              maxWidth: "55vw",
              textDecoration: node.v ? "line-through" : "none",
            }}>{node.n}</span>
            {node.c != null && (
              <span style={{
                fontSize: 11, fontWeight: 700,
                color: col.accent, background: col.accent + "18",
                padding: "1px 7px", borderRadius: 10, whiteSpace: "nowrap",
              }}>{node.c}명</span>
            )}
            {node.v && (
              <span style={{ fontSize: 10, color: "#9CA3AF", background: "#F3F4F6", padding: "1px 6px", borderRadius: 8 }}>가상</span>
            )}
          </div>
          {node.l && <div style={{ fontSize: 11, color: "#64748B", marginTop: 2 }}>{node.l}</div>}
        </div>

        {/* 자식 수 뱃지 */}
        {has && (
          <span style={{
            fontSize: 11, fontWeight: 600,
            color: col.accent, background: col.accent + "18",
            padding: "2px 8px", borderRadius: 10, flexShrink: 0,
          }}>{node.ch.length}</span>
        )}
      </div>

      {/* 하위 조직 — 부모 색상의 수직선으로 연결 */}
      {has && open && (
        <div style={{
          borderLeft: `2px solid ${col.bd}`,
          marginLeft: 12, paddingLeft: 4,
        }}>
          {node.ch.map(ch => (
            <Node key={ch.id} node={ch} depth={depth + 1} exp={exp} toggle={toggle} matches={matches} />
          ))}
        </div>
      )}
    </div>
  );
}

function OrgChart() {
  const all = useMemo(() => flat(ORG), []);
  const [exp, setExp] = useState(() => {
    const s = new Set(["root"]);
    if (ORG.ch) ORG.ch.forEach(c => s.add(c.id));
    return s;
  });
  const [q, setQ] = useState("");
  const [tab, setTab] = useState("tree");
  const [copied, setCopied] = useState(false);

  const matches = useMemo(() => {
    if (!q.trim()) return new Set();
    const lo = q.trim().toLowerCase();
    const m = new Set();
    all.forEach(n => { if (n.n.toLowerCase().includes(lo) || (n.l && n.l.toLowerCase().includes(lo))) m.add(n.id); });
    return m;
  }, [q, all]);

  useEffect(() => {
    if (matches.size === 0) return;
    const nx = new Set(exp);
    function walk(n, par) {
      if (matches.has(n.id)) par.forEach(p => nx.add(p));
      if (n.ch) n.ch.forEach(c => walk(c, [...par, n.id]));
    }
    walk(ORG, []);
    setExp(nx);
  }, [matches]);

  const toggle = useCallback(id => {
    setExp(p => { const n = new Set(p); n.has(id) ? n.delete(id) : n.add(id); return n; });
  }, []);

  const expandAll  = () => setExp(new Set(all.map(n => n.id)));
  const collapseAll = () => {
    const s = new Set(["root"]);
    if (ORG.ch) ORG.ch.forEach(c => s.add(c.id));
    setExp(s);
  };

  const copyLink = () => {
    navigator.clipboard.writeText(window.location.href).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };

  const corps = ORG.ch || [];
  const total = ORG.c || 1;
  const lvCounts = useMemo(() => {
    const c = {};
    all.forEach(n => { if (n.id !== "root") c[n.lv] = (c[n.lv] || 0) + 1; });
    return c;
  }, [all]);
  const leaders = useMemo(() => all.filter(n => n.lv >= 3 && n.lv <= 4 && n.l && !n.v), [all]);

  return (
    <div style={{ minHeight: "100vh", background: "linear-gradient(160deg,#F8F7FF,#EEF2FF 50%,#E8F5FF)", fontFamily: "'Pretendard','Apple SD Gothic Neo',-apple-system,sans-serif", color: "#0F172A" }}>

      {/* 헤더 */}
      <div style={{ background: "linear-gradient(135deg,#0F172A,#1E1B4B 50%,#1E3A8A)", color: "#fff", padding: "18px 16px 14px", position: "sticky", top: 0, zIndex: 50, boxShadow: "0 4px 24px rgba(15,23,42,0.35)" }}>
        <div style={{ maxWidth: 800, margin: "0 auto" }}>

          {/* 타이틀 + 법인 뱃지 + 링크 복사 */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 12 }}>
            <div>
              <h1 style={{ margin: 0, fontSize: 20, fontWeight: 800, letterSpacing: -0.5 }}>NHN 조직도</h1>
              <p style={{ margin: "3px 0 0", fontSize: 12, opacity: 0.6 }}>2026.03.01 기준 · {total.toLocaleString()}명</p>
            </div>
            <div style={{ display: "flex", flexDirection: "column", alignItems: "flex-end", gap: 6 }}>
              <button
                onClick={copyLink}
                style={{
                  padding: "5px 12px", borderRadius: 8, border: "1px solid rgba(255,255,255,0.25)",
                  background: copied ? "rgba(34,197,94,0.25)" : "rgba(255,255,255,0.12)",
                  color: "#fff", fontSize: 12, fontWeight: 600, cursor: "pointer",
                  fontFamily: "inherit", transition: "background 0.2s",
                  backdropFilter: "blur(4px)",
                }}
              >
                {copied ? "복사됨!" : "링크 복사"}
              </button>
              <div style={{ display: "flex", gap: 4, flexWrap: "wrap", justifyContent: "flex-end" }}>
                {corps.map(c => (
                  <div key={c.id} style={{ background: "rgba(255,255,255,0.1)", borderRadius: 8, padding: "3px 10px", fontSize: 11, textAlign: "center", backdropFilter: "blur(4px)" }}>
                    <div style={{ fontWeight: 700 }}>{c.n}</div>
                    <div style={{ opacity: 0.75 }}>{(c.c || 0).toLocaleString()}명</div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* 검색 */}
          <div style={{ marginTop: 12, display: "flex", alignItems: "center", background: "rgba(255,255,255,0.12)", borderRadius: 10, padding: "0 12px", border: "1px solid rgba(255,255,255,0.15)", backdropFilter: "blur(8px)" }}>
            <span style={{ fontSize: 15, marginRight: 8, opacity: 0.6 }}>🔍</span>
            <input
              value={q} onChange={e => setQ(e.target.value)}
              placeholder="조직명 또는 조직장 검색..."
              style={{ flex: 1, padding: "10px 0", border: "none", outline: "none", background: "transparent", color: "#fff", fontSize: 14, fontFamily: "inherit" }}
            />
            {q && <span onClick={() => setQ("")} style={{ cursor: "pointer", opacity: 0.6, fontSize: 14, padding: 4 }}>✕</span>}
          </div>
          {matches.size > 0 && <div style={{ fontSize: 12, opacity: 0.65, marginTop: 6 }}>{matches.size}개 조직 검색됨</div>}

          {/* 탭 */}
          <div style={{ display: "flex", gap: 4, marginTop: 12 }}>
            {[{ k: "tree", l: "🏢 조직도" }, { k: "summary", l: "📊 현황 요약" }].map(t => (
              <button key={t.k} onClick={() => setTab(t.k)} style={{ flex: 1, padding: "8px 0", border: "none", borderRadius: 8, background: tab === t.k ? "rgba(255,255,255,0.2)" : "transparent", color: "#fff", fontWeight: tab === t.k ? 700 : 400, fontSize: 13, cursor: "pointer", fontFamily: "inherit" }}>{t.l}</button>
            ))}
          </div>
        </div>
      </div>

      {/* 본문 */}
      <div style={{ maxWidth: 800, margin: "0 auto", padding: "12px 12px 80px" }}>

        {tab === "tree" && <>
          {/* 컨트롤 */}
          <div style={{ display: "flex", gap: 6, marginBottom: 8, justifyContent: "flex-end" }}>
            <button onClick={expandAll}   style={{ padding: "6px 14px", borderRadius: 8, border: "1px solid #DBEAFE", background: "#fff", fontSize: 12, fontWeight: 600, color: "#1D4ED8", cursor: "pointer", fontFamily: "inherit" }}>전체 펼치기</button>
            <button onClick={collapseAll} style={{ padding: "6px 14px", borderRadius: 8, border: "1px solid #E2E8F0", background: "#fff", fontSize: 12, fontWeight: 600, color: "#64748B", cursor: "pointer", fontFamily: "inherit" }}>접기</button>
          </div>

          {/* 범례 */}
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 10, padding: "8px 12px", background: "#fff", borderRadius: 10, border: "1px solid #E2E8F0" }}>
            {[5, 4, 3, 2, 1, 0].map(lv => (
              <div key={lv} style={{ display: "flex", alignItems: "center", gap: 5 }}>
                <div style={{ width: 10, height: 10, borderRadius: 3, background: LV[lv].accent }} />
                <span style={{ fontSize: 11, color: "#64748B" }}>{LV[lv].name}</span>
              </div>
            ))}
          </div>

          {/* 트리 */}
          <div style={{ background: "#fff", borderRadius: 14, padding: "12px 8px", border: "1px solid #E8EAED", boxShadow: "0 2px 16px rgba(29,78,216,0.05)" }}>
            {corps.map(c => <Node key={c.id} node={c} depth={0} exp={exp} toggle={toggle} matches={matches} />)}
          </div>
        </>}

        {tab === "summary" && (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>

            {/* 법인별 현황 */}
            <div style={{ background: "#fff", borderRadius: 14, padding: 20, border: "1px solid #E8EAED" }}>
              <h3 style={{ margin: "0 0 16px", fontSize: 16, fontWeight: 800 }}>법인별 현황</h3>
              {corps.map(s => {
                const pct = (s.c || 0) / total * 100;
                const col = LV[s.lv] || LV[5];
                return (
                  <div key={s.id} style={{ marginBottom: 14 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 4 }}>
                      <div>
                        <span style={{ fontWeight: 700, fontSize: 14 }}>{s.n}</span>
                        <span style={{ fontSize: 12, color: "#94A3B8", marginLeft: 8 }}>{s.l}</span>
                      </div>
                      <span style={{ fontWeight: 700, fontSize: 14, color: col.accent }}>{(s.c || 0).toLocaleString()}명</span>
                    </div>
                    <div style={{ height: 8, background: "#F1F5F9", borderRadius: 4, overflow: "hidden" }}>
                      <div style={{ height: "100%", width: `${pct}%`, background: `linear-gradient(90deg,${col.accent},${col.accent}99)`, borderRadius: 4, transition: "width 0.5s" }} />
                    </div>
                    <div style={{ fontSize: 11, color: "#94A3B8", marginTop: 2 }}>{pct.toFixed(1)}% · 산하 {(s.ch || []).length}개 조직</div>
                  </div>
                );
              })}
            </div>

            {/* 레벨별 통계 */}
            <div style={{ background: "#fff", borderRadius: 14, padding: 20, border: "1px solid #E8EAED" }}>
              <h3 style={{ margin: "0 0 16px", fontSize: 16, fontWeight: 800 }}>조직 레벨별 현황</h3>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fit,minmax(110px,1fr))", gap: 10 }}>
                {[5, 4, 3, 2, 1, 0].map(lv => (
                  <div key={lv} style={{ textAlign: "center", padding: "14px 8px", borderRadius: 12, background: LV[lv].light, border: `1px solid ${LV[lv].bd}` }}>
                    <div style={{ fontSize: 26, fontWeight: 800, color: LV[lv].accent }}>{lvCounts[lv] || 0}</div>
                    <div style={{ fontSize: 11, color: "#64748B", fontWeight: 600, marginTop: 3 }}>{LV[lv].name}</div>
                  </div>
                ))}
              </div>
            </div>

            {/* 본부/센터급 조직장 */}
            <div style={{ background: "#fff", borderRadius: 14, padding: 20, border: "1px solid #E8EAED" }}>
              <h3 style={{ margin: "0 0 16px", fontSize: 16, fontWeight: 800 }}>본부/센터급 조직장</h3>
              {leaders.map(n => {
                const col = LV[n.lv] || LV[0];
                return (
                  <div key={n.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "8px 12px", borderRadius: 8, background: col.light, marginBottom: 6, border: `1px solid ${col.bd}` }}>
                    <div style={{ width: 34, height: 34, borderRadius: "50%", background: col.accent, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 13, fontWeight: 700, flexShrink: 0 }}>
                      {(n.l || "").replace(" (겸직)", "").slice(0, 1)}
                    </div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 13, fontWeight: 700 }}>{n.l}</div>
                      <div style={{ fontSize: 11, color: "#64748B" }}>{n.n}</div>
                    </div>
                    {n.c != null && <span style={{ fontSize: 12, color: col.accent, fontWeight: 700 }}>{n.c}명</span>}
                  </div>
                );
              })}
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<OrgChart />);
</script>
</body>
</html>
